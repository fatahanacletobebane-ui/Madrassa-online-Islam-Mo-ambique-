<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Islam Moçambique</title>

  <style>
    body { font-family: Arial; margin:0; background:#f4f6f8; }
    header { background:#0a7c4a; color:white; padding:20px; text-align:center; }
    nav { background:#064e2f; padding:10px; text-align:center; }
    nav a { color:white; margin:10px; text-decoration:none; font-weight:bold; }
    .container { padding:20px; }
    .card { background:white; padding:20px; margin-bottom:20px; border-radius:10px; box-shadow:0 2px 5px rgba(0,0,0,0.1); }
    h2 { color:#0a7c4a; }
    input, button { padding:10px; margin:5px 0; width:100%; }
    button { background:#0a7c4a; color:white; border:none; cursor:pointer; }
    footer { background:#0a7c4a; color:white; text-align:center; padding:15px; }
  </style>

  <!-- Firebase -->
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
    import { getDatabase, ref, push, onValue } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

    const firebaseConfig = {
      apiKey: "COLOCA_AQUI",
      authDomain: "madrassa-online-b851c.firebaseapp.com",
      databaseURL: "https://madrassa-online-b851c-default-rtdb.firebaseio.com",
      projectId: "madrassa-online-b851c",
      storageBucket: "madrassa-online-b851c.appspot.com",
      messagingSenderId: "COLOCA_AQUI",
      appId: "COLOCA_AQUI"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    // INSCRIÇÃO
    window.salvarUsuario = function(e) {
      e.preventDefault();

      const nome = document.getElementById('nome').value;
      const numero = document.getElementById('numero').value;

      push(ref(db, 'usuarios'), {
        nome: nome,
        numero: numero,
        data: new Date().toLocaleString()
      });

      // WhatsApp automático
      const mensagem = `Assalamu Alaikum, acabei de me inscrever. Nome: ${nome}`;
      window.open(`https://wa.me/258860407269?text=${encodeURIComponent(mensagem)}`);

      document.getElementById('msg').innerText = "Inscrição feita com sucesso!";
      document.querySelector('form').reset();
    }

    // LOGIN ALUNO
    window.loginAluno = function() {
      localStorage.setItem("logado", "sim");
      document.getElementById("materias").style.display = "block";
      alert("Login feito!");
    }

    // ADMIN
    window.loginAdmin = function() {
      const senha = document.getElementById("senhaAdmin").value;

      if (senha === "12345") {
        carregarUsuarios();
      } else {
        alert("Senha incorreta");
      }
    }

    function carregarUsuarios() {
      const lista = document.getElementById("lista");
      const usuariosRef = ref(db, 'usuarios');

      onValue(usuariosRef, (snapshot) => {
        lista.innerHTML = "";
        snapshot.forEach((child) => {
          const u = child.val();
          let li = document.createElement("li");
          li.textContent = u.nome + " - " + u.numero + " (" + u.data + ")";
          lista.appendChild(li);
        });
      });
    }

    // BLOQUEAR CONTEÚDO
    window.onload = function() {
      if (localStorage.getItem("logado") !== "sim") {
        document.getElementById("materias").style.display = "none";
      }
    }
  </script>
</head>

<body>

<header>
  <h1>Islam Moçambique</h1>
  <p>Assistência: 860407269</p>
</header>

<nav>
  <a href="#">Matérias</a>
  <a href="#">Inscrição</a>
  <a href="#">Login</a>
  <a href="#">Admin</a>
</nav>

<div class="container">

  <!-- MATÉRIAS -->
  <div id="materias" class="card">
    <h2>Aulas Yassarna</h2>
    <p>Aula 1 - Letras árabes</p>
    <p>Aula 2 - Pronúncia</p>
    <p>Aula 3 - Harakat</p>
    <p>Aula 4 - Junção</p>
    <p>Aula 5 - Leitura</p>
  </div>

  <!-- INSCRIÇÃO -->
  <div class="card">
    <h2>Inscrição</h2>
    <form onsubmit="salvarUsuario(event)">
      <input type="text" id="nome" placeholder="Nome" required>
      <input type="tel" id="numero" placeholder="Número" required>
      <button type="submit">Inscrever</button>
    </form>
    <p id="msg"></p>
  </div>

  <!-- LOGIN -->
  <div class="card">
    <h2>Login Aluno</h2>
    <button onclick="loginAluno()">Entrar</button>
  </div>

  <!-- ADMIN -->
  <div class="card">
    <h2>Admin</h2>
    <input type="password" id="senhaAdmin" placeholder="Senha">
    <button onclick="loginAdmin()">Entrar</button>
    <ul id="lista"></ul>
  </div>

</div>

<footer>
  <p>© 2026 Islam Moçambique</p>
</footer>

</body>
</html>
