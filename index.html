<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Islam Moçambique</title>

<style>
body {
    font-family: Arial;
    margin: 0;
    background: linear-gradient(to right, #0f2027, #203a43, #2c5364);
    color: white;
    text-align: center;
}

.container {
    padding: 20px;
}

.card {
    background: rgba(255,255,255,0.1);
    padding: 15px;
    margin: 10px;
    border-radius: 15px;
}

button {
    width: 90%;
    padding: 12px;
    margin: 8px;
    border-radius: 10px;
    border: none;
    background: #00c853;
    color: white;
}

.hidden {
    display: none;
}
</style>
</head>

<body>

<div class="container">

<h1>🌙 Islam Moçambique</h1>

<!-- LOGIN -->
<div id="auth">
<input id="numero"><br><br>
<input id="pin" type="password"><br><br>

<button onclick="registrar()">Registar</button>
<button onclick="login()">Entrar</button>
</div>

<!-- APP -->
<div id="app" class="hidden">

<p>⭐ <span id="stars"></span></p>
<p><span id="nivel"></span></p>

<div class="card">

<button onclick="abrir('horario_de_salat')">Horário de Salat</button>
<button onclick="abrir('alcorao')">Alcorão</button>
<button onclick="abrir('reversao_novo_muculmano')">Novo Muçulmano</button>
<button onclick="abrir('alfabeto_arabe')">Alfabeto Árabe</button>
<button onclick="abrir('tasbih_digital')">Tasbih Digital</button>
<button onclick="abrir('yassarna_parte_1')">Yassarna Parte 1</button>
<button onclick="abrir('yassarna_2_parte')">Yassarna Parte 2</button>

<button onclick="mostrarApoio()">Apoio</button>
<button onclick="ganhar()">Ganhar Estrelas</button>

</div>

</div>

<!-- APOIO -->
<div id="apoio" class="hidden card">
<p>
A islam Moçambique tem trabalhado arduamente para difundir o din de Allah.<br><br>

Mpesa: 1228803 (Bebane)<br>
E-mola: 860407269 (Anacleto Bebane)<br>
Millennium BIM NIB: 000100000012473356257<br><br>

Que Allah recompense. Ameen
</p>
<button onclick="voltar()">Voltar</button>
</div>

<!-- TAREFAS -->
<div id="tarefas" class="hidden card">

<button onclick="partilhar()">Partilhar (+2⭐)</button>
<button onclick="ads()">Ver (+4⭐)</button>

<br><br>

<input id="codigoPro" type="password"><br><br>
<button onclick="ativarPro()">Ativar PRO</button>

<p id="timer"></p>

<button onclick="voltar()">Voltar</button>
</div>

</div>

<script>

let user = null

function getData(){
    return JSON.parse(localStorage.getItem("db")) || {}
}

function saveData(db){
    localStorage.setItem("db", JSON.stringify(db))
}

// CONVERTER NUMERO -> LETRAS
function converter(numero){
    let mapa = ["A","B","C","D","E","F","G","H","I","J"]
    return numero.split("").map(n => mapa[n]).join("")
}

function registrar(){
    let n = document.getElementById("numero").value
    let p = document.getElementById("pin").value

    let db = getData()

    if(db[n]) return alert("Existe")

    db[n] = {
        pin: p,
        estrelas: 50,
        pro: false,
        expira: 0
    }

    saveData(db)
    alert("OK")
}

function login(){
    let n = document.getElementById("numero").value
    let p = document.getElementById("pin").value

    let db = getData()

    if(db[n] && db[n].pin === p){
        user = n
        document.getElementById("auth").classList.add("hidden")
        document.getElementById("app").classList.remove("hidden")
        atualizar()
    } else {
        alert("Erro")
    }
}

function atualizar(){
    let db = getData()
    let u = db[user]

    if(u.pro && Date.now() > u.expira){
        u.pro = false
    }

    document.getElementById("stars").innerText = u.estrelas
    document.getElementById("nivel").innerText = u.pro ? "PRO ATIVO" : "NORMAL"

    saveData(db)
}

function abrir(pasta){
    let db = getData()
    let u = db[user]

    if(!u.pro){
        if(u.estrelas < 5) return alert("Sem estrelas")
        u.estrelas -= 5
    }

    saveData(db)
    atualizar()

    window.location.href =
    "https://fatahanacletobebane-ui.github.io/web_IM/" + pasta + "/index.html"
}

function mostrarApoio(){
    hideAll()
    document.getElementById("apoio").classList.remove("hidden")
}

function ganhar(){
    hideAll()
    document.getElementById("tarefas").classList.remove("hidden")
}

function voltar(){
    hideAll()
    document.getElementById("app").classList.remove("hidden")
}

function hideAll(){
    document.getElementById("app").classList.add("hidden")
    document.getElementById("apoio").classList.add("hidden")
    document.getElementById("tarefas").classList.add("hidden")
}

// PARTILHA
function partilhar(){
    let texto = "https://fatahanacletobebane-ui.github.io/web_IM/"
    window.open("https://wa.me/?text=" + texto)

    let db = getData()
    db[user].estrelas += 2
    saveData(db)
    atualizar()
}

// ADS
function ads(){
    let t = 10
    let el = document.getElementById("timer")

    let i = setInterval(()=>{
        el.innerText = t
        t--

        if(t < 0){
            clearInterval(i)

            let db = getData()
            db[user].estrelas += 4
            saveData(db)
            atualizar()

            el.innerText = "OK"
        }
    },1000)
}

// PRO
function ativarPro(){
    let codigo = document.getElementById("codigoPro").value

    let esperado = converter(user)

    if(codigo === esperado){
        let db = getData()

        db[user].pro = true
        db[user].expira = Date.now() + (35*24*60*60*1000)

        saveData(db)
        atualizar()

        alert("PRO ativado")
    } else {
        alert("Código inválido")
    }
}

</script>

</body>
</html>
